<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استمارة التسجيل مع الصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <!-- html2pdf لتحميل PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: #0a1a0a;
            color: #e8f0e8;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(20, 40, 25, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            padding: 30px 25px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: #d4a017;
        }
        h1 span {
            color: #fff;
        }
        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* ===== FORM ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #ddd;
        }
        input,
        textarea {
            padding: 12px 14px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
        }
        input:focus,
        textarea:focus {
            border-color: #d4a017;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.2);
        }

        /* رفع الصورة */
        .upload-area {
            position: relative;
            overflow: hidden;
            border: 2px dashed #d4a017;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            background: rgba(212, 160, 23, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover {
            background: rgba(212, 160, 23, 0.12);
        }
        .upload-area input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-area .icon {
            font-size: 2rem;
            color: #d4a017;
        }
        .upload-area .text {
            font-size: 0.9rem;
            color: #bbb;
            margin-top: 4px;
        }
        .preview {
            margin-top: 10px;
            max-width: 120px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            border: 2px solid #d4a017;
        }
        .preview img {
            width: 100%;
            display: block;
        }
        .status-msg {
            font-size: 0.85rem;
            margin-top: 4px;
            color: #2ecc71;
        }

        .btn-submit {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* ===== ADMIN PANEL ===== */
        .admin-toggle {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: #00733f;
            border: none;
            border-radius: 60px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-toggle:hover {
            background: #005a2e;
        }
        .admin-panel {
            display: none;
            margin-top: 30px;
            border-top: 2px solid rgba(212, 160, 23, 0.2);
            padding-top: 25px;
        }
        .admin-panel.show {
            display: block;
        }
        .admin-panel h2 {
            color: #d4a017;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }
        .admin-login {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-login input {
            flex: 1;
            min-width: 180px;
        }
        .admin-login button {
            background: #d4a017;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
        }
        .admin-login .error {
            color: #e74c3c;
            font-size: 0.9rem;
            display: none;
        }
        .table-wrap {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 900px;
        }
        th {
            background: #00733f;
            color: #fff;
            padding: 10px 6px;
            text-align: center;
            white-space: nowrap;
        }
        td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }
        .thumb {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4a017;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge.pending {
            background: #f39c12;
            color: #000;
        }
        .badge.approved {
            background: #2ecc71;
            color: #000;
        }
        .badge.rejected {
            background: #e74c3c;
            color: #fff;
        }
        .btn-sm {
            padding: 4px 10px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.7rem;
            margin: 2px;
            display: inline-block;
            white-space: nowrap;
        }
        .btn-sm-success {
            background: #2ecc71;
            color: #000;
        }
        .btn-sm-success:hover {
            background: #27ae60;
        }
        .btn-sm-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-sm-danger:hover {
            background: #c0392b;
        }
        .btn-sm-warning {
            background: #f39c12;
            color: #000;
        }
        .btn-sm-warning:hover {
            background: #e67e22;
        }
        .btn-sm-info {
            background: #3498db;
            color: #fff;
        }
        .btn-sm-info:hover {
            background: #2980b9;
        }
        .btn-sm-pdf {
            background: #e67e22;
            color: #fff;
        }
        .btn-sm-pdf:hover {
            background: #d35400;
        }

        /* ===== POPUP تأكيد ===== */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .popup-overlay.active {
            display: flex;
        }
        .popup-box {
            background: linear-gradient(145deg, #1a2a1a, #0D1A0D);
            border: 2px solid #d4a017;
            border-radius: 30px;
            padding: 35px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(212, 160, 23, 0.2);
            animation: popupPulse 0.4s ease;
        }
        @keyframes popupPulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .popup-box i {
            font-size: 3.5rem;
            color: #d4a017;
            margin-bottom: 10px;
        }
        .popup-box h3 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 12px;
            font-family: 'Amiri', serif;
        }
        .popup-box .info-grid {
            text-align: right;
            margin: 12px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .popup-box .info-grid p {
            margin: 2px 0;
            color: #ddd;
        }
        .popup-box .info-grid strong {
            color: #d4a017;
        }
        .popup-box .info-grid img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4a017;
            margin-top: 4px;
        }
        .popup-close {
            background: #d4a017;
            border: none;
            color: #000;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            margin-top: 8px;
        }
        .popup-close:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
            table {
                font-size: 0.7rem;
                min-width: 700px;
            }
            .thumb {
                width: 35px;
                height: 35px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📋 <span>استمارة</span> التسجيل</h1>
        <p class="sub">أكمل بياناتك وارفع صورتك</p>

        <!-- ===== FORM ===== -->
        <form id="registrationForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="firstName" placeholder="مثال: أحمد" required />
                </div>
                <div class="form-group">
                    <label>اللقب</label>
                    <input type="text" id="lastName" placeholder="مثال: بن سليمان" required />
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" placeholder="05XXXXXXXX" required />
                </div>
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="address" placeholder="المدينة، الحي" />
                </div>
                <div class="form-group full">
                    <label>تاريخ ومكان الميلاد</label>
                    <input type="text" id="birth" placeholder="مثال: 01-01-2010، الجزائر" />
                </div>
                <div class="form-group full">
                    <label>صورة شخصية</label>
                    <div class="upload-area" id="uploadArea">
                        <div class="icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <div class="text">انقر لاختيار صورة</div>
                        <input type="file" id="imageInput" accept="image/*" required />
                    </div>
                    <div class="preview" id="previewContainer">
                        <img id="previewImg" src="#" alt="معاينة" />
                    </div>
                    <div class="status-msg" id="uploadStatus"></div>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> تسجيل</button>
        </form>

        <!-- ===== ADMIN TOGGLE ===== -->
        <button class="admin-toggle" id="adminToggleBtn"><i class="fas fa-lock"></i> لوحة التحكم</button>

        <!-- ===== ADMIN PANEL ===== -->
        <div class="admin-panel" id="adminPanel">
            <h2>🔐 لوحة التحكم</h2>
            <div class="admin-login" id="adminLogin">
                <input type="password" id="adminPass" placeholder="كلمة السر" />
                <button onclick="adminLogin()">دخول</button>
                <span class="error" id="loginError">❌ كلمة سر غير صحيحة</span>
            </div>
            <div id="adminContent" style="display:none;">
                <div id="stats" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;"></div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الصورة</th>
                                <th>الاسم</th>
                                <th>اللقب</th>
                                <th>الهاتف</th>
                                <th>العنوان</th>
                                <th>الميلاد</th>
                                <th>التاريخ</th>
                                <th>الحالة</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== POPUP CONFIRMATION ===== -->
    <div class="popup-overlay" id="confirmPopup">
        <div class="popup-box">
            <i class="fas fa-check-circle"></i>
            <h3>✅ تم التسجيل بنجاح</h3>
            <div class="info-grid" id="confirmInfo"></div>
            <button class="popup-close" onclick="closeConfirmPopup()">حسناً</button>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. Firebase Config
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCDrCtY7weMKAfWQq1k3Hx9hx1PPWa4XAE",
            authDomain: "academy-al.firebaseapp.com",
            projectId: "academy-al",
            storageBucket: "academy-al.firebasestorage.app",
            messagingSenderId: "205174400637",
            appId: "1:205174400637:web:33c0bb5e284457b34b3314"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase ready');
        } catch (e) {
            console.error('❌ Firebase init error', e);
        }
        const database = firebase.database();

        // ================================================================
        // 2. معاينة الصورة
        // ================================================================
        const fileInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('previewImg');
        const uploadStatus = document.getElementById('uploadStatus');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                previewContainer.style.display = 'none';
                uploadStatus.textContent = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                uploadStatus.textContent = '❌ حجم الصورة كبير (حد أقصى 5 ميجا)';
                uploadStatus.style.color = '#e74c3c';
                this.value = '';
                previewContainer.style.display = 'none';
                return;
            }
            const types = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!types.includes(file.type)) {
                uploadStatus.textContent = '❌ نوع غير مدعوم (JPEG, PNG, WEBP, GIF)';
                uploadStatus.style.color = '#e74c3c';
                this.value = '';
                previewContainer.style.display = 'none';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(ev) {
                previewImg.src = ev.target.result;
                previewContainer.style.display = 'block';
                uploadStatus.textContent = '✅ تم اختيار الصورة';
                uploadStatus.style.color = '#2ecc71';
            };
            reader.readAsDataURL(file);
        });

        // ================================================================
        // 3. حفظ التسجيل (Base64) مع نافذة تأكيد
        // ================================================================
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const birth = document.getElementById('birth').value.trim();
            const file = fileInput.files[0];

            if (!firstName || !lastName || !phone) {
                alert('❌ الاسم واللقب والهاتف إجبارية');
                return;
            }
            if (!file) {
                alert('❌ الرجاء اختيار صورة');
                return;
            }

            try {
                // قراءة الصورة كـ Base64
                const reader = new FileReader();
                const imageData = await new Promise((resolve, reject) => {
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                const regData = {
                    firstName,
                    lastName,
                    phone,
                    address,
                    birth,
                    imageUrl: imageData,
                    status: 'pending',
                    date: new Date().toLocaleString('ar-EG'),
                    timestamp: Date.now()
                };

                // حفظ في Firebase
                const newRef = database.ref('registrations').push();
                await newRef.set(regData);

                // عرض نافذة التأكيد
                document.getElementById('confirmInfo').innerHTML = `
                    <p><strong>الاسم:</strong> ${firstName}</p>
                    <p><strong>اللقب:</strong> ${lastName}</p>
                    <p><strong>الهاتف:</strong> ${phone}</p>
                    <p><strong>العنوان:</strong> ${address || '—'}</p>
                    <p><strong>الميلاد:</strong> ${birth || '—'}</p>
                    <p><strong>الصورة:</strong> <img src="${imageData}" alt="صورة" /></p>
                `;
                document.getElementById('confirmPopup').classList.add('active');

                // إعادة تعيين النموذج
                this.reset();
                previewContainer.style.display = 'none';
                uploadStatus.textContent = '';

                // تحديث لوحة التحكم إذا كانت مفتوحة
                if (document.getElementById('adminContent').style.display !== 'none') {
                    renderAdminTable();
                    renderStats();
                }
            } catch (error) {
                console.error(error);
                alert('❌ حدث خطأ، حاول مرة أخرى');
            }
        });

        // إغلاق نافذة التأكيد
        function closeConfirmPopup() {
            document.getElementById('confirmPopup').classList.remove('active');
        }

        // ================================================================
        // 4. دوال التحميل (الصورة و PDF)
        // ================================================================

        // تحميل الصورة كملف PNG
        function downloadImage(imageDataUrl, fileName) {
            const link = document.createElement('a');
            link.href = imageDataUrl;
            link.download = fileName + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // تحميل PDF
        function downloadPDF(reg) {
            const container = document.createElement('div');
            container.style.cssText =
                'background: white; color: black; font-family: Arial, sans-serif; padding: 30px; max-width: 600px; margin: auto; text-align: center; border-radius: 8px;';
            container.innerHTML = `
                <h1 style="color: #d4a017; font-size: 24px; margin-bottom: 10px;">📄 ملف لاعب</h1>
                <hr style="border: 1px solid #d4a017; margin-bottom: 20px;" />
                <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
                    <img src="${reg.imageUrl}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #d4a017;" />
                    <div style="text-align: right; width: 100%; padding: 0 20px; font-size: 16px; line-height: 2;">
                        <p><strong>الاسم:</strong> ${reg.firstName || ''}</p>
                        <p><strong>اللقب:</strong> ${reg.lastName || ''}</p>
                        <p><strong>الهاتف:</strong> ${reg.phone || ''}</p>
                        <p><strong>العنوان:</strong> ${reg.address || ''}</p>
                        <p><strong>الميلاد:</strong> ${reg.birth || ''}</p>
                        <p><strong>تاريخ التسجيل:</strong> ${reg.date || ''}</p>
                        <p><strong>الحالة:</strong> ${reg.status === 'approved' ? '✅ معتمد' : reg.status === 'rejected' ? '❌ مرفوض' : '⏳ قيد الانتظار'}</p>
                    </div>
                </div>
                <hr style="margin-top: 20px; border: 1px solid #ddd;" />
                <p style="font-size: 12px; color: #888;">تم إنشاء هذا الملف من لوحة التحكم</p>
            `;
            document.body.appendChild(container);

            html2pdf()
                .set({
                    margin: 10,
                    filename: `لاعب_${reg.firstName}_${reg.lastName}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                })
                .from(container)
                .save()
                .then(() => {
                    document.body.removeChild(container);
                })
                .catch(err => {
                    console.error('PDF error:', err);
                    alert('❌ فشل إنشاء PDF');
                    document.body.removeChild(container);
                });
        }

        // ================================================================
        // 5. لوحة التحكم
        // ================================================================
        const ADMIN_PASSWORD = 'admin2025';
        let loggedIn = false;

        function adminLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                loggedIn = true;
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdminTable();
                renderStats();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => document.getElementById('loginError').style.display = 'none', 3000);
            }
        }

        document.getElementById('adminToggleBtn').addEventListener('click', function() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show') && loggedIn) {
                renderAdminTable();
                renderStats();
            }
        });

        function renderStats() {
            database.ref('registrations').once('value', (snapshot) => {
                const data = snapshot.val();
                const registrations = data ? Object.values(data) : [];
                const pending = registrations.filter(r => r.status === 'pending').length;
                const approved = registrations.filter(r => r.status === 'approved').length;
                document.getElementById('stats').innerHTML = `
                    <div style="background:rgba(255,255,255,0.05); padding:10px 18px; border-radius:12px;">
                        <strong style="color:#d4a017;">${registrations.length}</strong> إجمالي
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:10px 18px; border-radius:12px;">
                        <strong style="color:#f39c12;">${pending}</strong> قيد الانتظار
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:10px 18px; border-radius:12px;">
                        <strong style="color:#2ecc71;">${approved}</strong> معتمد
                    </div>
                `;
            });
        }

        function renderAdminTable() {
            database.ref('registrations').orderByChild('timestamp').once('value', (snapshot) => {
                const data = snapshot.val();
                const registrations = data ? Object.values(data) : [];
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';

                registrations.forEach((reg, idx) => {
                    const statusClass = reg.status === 'approved' ? 'approved' : (reg.status === 'rejected' ?
                        'rejected' : 'pending');
                    const statusText = reg.status === 'approved' ? 'معتمد' : (reg.status === 'rejected' ? 'مرفوض' :
                        'قيد الانتظار');
                    const imageUrl = reg.imageUrl && reg.imageUrl.startsWith('data:image') ? reg.imageUrl :
                        'https://via.placeholder.com/45/00733F/FFFFFF?text=صورة';

                    // نحتاج إلى المفتاح (id) من أجل التحديث والحذف
                    const key = Object.keys(data).find(k => data[k] === reg) || '';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${idx + 1}</td>
                        <td><img src="${imageUrl}" class="thumb" onclick="window.open('${imageUrl}','_blank')" title="اضغط للتكبير" /></td>
                        <td>${reg.firstName || ''}</td>
                        <td>${reg.lastName || ''}</td>
                        <td>${reg.phone || ''}</td>
                        <td>${reg.address || ''}</td>
                        <td>${reg.birth || ''}</td>
                        <td>${reg.date || ''}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>
                            ${reg.status === 'pending' ? `
                                <button class="btn-sm btn-sm-success" onclick="updateStatus('${key}','approved')">قبول</button>
                                <button class="btn-sm btn-sm-danger" onclick="updateStatus('${key}','rejected')">رفض</button>
                            ` : ''}
                            <button class="btn-sm btn-sm-warning" onclick="deleteRecord('${key}')">حذف</button>
                            <button class="btn-sm btn-sm-info" onclick="downloadImage('${imageUrl}','${reg.firstName}_${reg.lastName}')"><i class="fas fa-download"></i> صورة</button>
                            <button class="btn-sm btn-sm-pdf" onclick="downloadPDF(${JSON.stringify(reg).replace(/"/g, '&quot;')})"><i class="fas fa-file-pdf"></i> PDF</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // دوال التحديث والحذف
        window.updateStatus = function(id, status) {
            if (!confirm(`هل تريد ${status === 'approved' ? 'قبول' : 'رفض'} هذا الطلب؟`)) return;
            database.ref('registrations/' + id).update({ status: status })
                .then(() => {
                    renderAdminTable();
                    renderStats();
                })
                .catch(err => alert('❌ فشل التحديث: ' + err.message));
        };

        window.deleteRecord = function(id) {
            if (!confirm('هل تريد حذف هذا السجل نهائياً؟')) return;
            database.ref('registrations/' + id).remove()
                .then(() => {
                    renderAdminTable();
                    renderStats();
                })
                .catch(err => alert('❌ فشل الحذف: ' + err.message));
        };

        // ================================================================
        // 6. تهيئة
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            if (document.getElementById('adminPanel').classList.contains('show') && loggedIn) {
                renderAdminTable();
                renderStats();
            }
        });
    </script>
</body>
</html>
