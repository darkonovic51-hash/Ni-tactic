<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أكاديمية كرة القدم - التسجيل ولوحة التحكم</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* (جميع الأنماط كما هي دون تغيير) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        h1, h2 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 20px;
        }
        h1 i {
            color: #f1c40f;
        }
        .form-section, .dashboard-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .form-group input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #2a5298;
            outline: none;
            box-shadow: 0 0 10px rgba(42, 82, 152, 0.3);
        }
        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            padding: 12px 20px;
            background: #2a5298;
            color: white;
            border-radius: 10px;
            transition: 0.3s;
            text-align: center;
        }
        .file-upload:hover {
            background: #1e3c72;
        }
        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-upload i {
            margin-left: 10px;
        }
        #fileName {
            margin-right: 15px;
            color: #555;
        }
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            background: #27ae60;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover {
            background: #1e8449;
            transform: scale(1.02);
        }
        .btn-danger {
            background: #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: #1e3c72;
            color: white;
            padding: 15px;
            text-align: center;
        }
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f1f9ff;
        }
        .player-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #2a5298;
        }
        .action-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 5px;
        }
        .action-btn:hover {
            background: #1e3c72;
        }
        .action-btn i {
            margin-left: 5px;
        }
        .delete-btn {
            background: #e74c3c;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
        #loading {
            text-align: center;
            color: #2a5298;
            font-size: 18px;
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }
        .toast.error {
            background: #e74c3c;
        }
        @media (max-width: 600px) {
            .form-group {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-futbol"></i> أكاديمية كرة القدم</h1>

        <!-- استمارة التسجيل -->
        <div class="form-section">
            <h2>تسجيل جديد</h2>
            <form id="registrationForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> الاسم</label>
                        <input type="text" id="firstName" placeholder="الاسم" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> اللقب</label>
                        <input type="text" id="lastName" placeholder="اللقب" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> العمر</label>
                        <input type="number" id="age" placeholder="العمر" required min="4" max="99" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                        <input type="tel" id="phone" placeholder="رقم الهاتف" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> المكان</label>
                        <input type="text" id="location" placeholder="المدينة / الحي" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> الصورة الشخصية</label>
                        <div class="file-upload">
                            <i class="fas fa-cloud-upload-alt"></i> اختر صورة
                            <input type="file" id="imageUpload" accept="image/*" />
                        </div>
                        <span id="fileName">لم يتم اختيار صورة</span>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-save"></i> تسجيل</button>
                <div id="loading"><i class="fas fa-spinner fa-spin"></i> جاري الحفظ...</div>
            </form>
        </div>

        <!-- لوحة التحكم -->
        <div class="dashboard-section">
            <h2><i class="fas fa-tachometer-alt"></i> لوحة التحكم - المسجلون</h2>
            <div class="table-responsive">
                <table id="playersTable">
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم الكامل</th>
                            <th>العمر</th>
                            <th>الهاتف</th>
                            <th>المكان</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- سيتم ملء البيانات هنا بواسطة JavaScript -->
                    </tbody>
                </table>
            </div>
            <p id="noData" style="text-align:center; color:#888; margin-top:20px;">لا يوجد مسجلون حتى الآن</p>
        </div>
    </div>

    <!-- Toast لإشعارات -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <!-- jsPDF لإنشاء PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- html2canvas لتحويل الصورة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // ------------------- إعداد Firebase (تم تحديثه ببياناتك) -------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCDrCtY7weMKAfWQq1k3Hx9hx1PPWa4XAE",
            authDomain: "academy-al.firebaseapp.com",
            databaseURL: "https://academy-al-default-rtdb.firebaseio.com",
            projectId: "academy-al",
            storageBucket: "academy-al.firebasestorage.app",
            messagingSenderId: "205174400637",
            appId: "1:205174400637:web:bf7a852ad18862cb4b3314"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const playersCollection = db.collection('players');

        // ------------------- باقي الكود (دوال التسجيل والعرض والتحميل) -------------------
        // (جميع الدوال كما هي دون تغيير)
        const form = document.getElementById('registrationForm');
        const firstName = document.getElementById('firstName');
        const lastName = document.getElementById('lastName');
        const age = document.getElementById('age');
        const phone = document.getElementById('phone');
        const location = document.getElementById('location');
        const imageUpload = document.getElementById('imageUpload');
        const fileName = document.getElementById('fileName');
        const tableBody = document.getElementById('tableBody');
        const noData = document.getElementById('noData');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');

        let selectedFile = null;

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        imageUpload.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                selectedFile = this.files[0];
                fileName.textContent = selectedFile.name;
            } else {
                selectedFile = null;
                fileName.textContent = 'لم يتم اختيار صورة';
            }
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!firstName.value || !lastName.value || !age.value || !phone.value || !location.value) {
                showToast('يرجى ملء جميع الحقول', true);
                return;
            }
            if (!selectedFile) {
                showToast('يرجى اختيار صورة', true);
                return;
            }

            loading.style.display = 'block';
            const submitBtn = form.querySelector('.btn');
            submitBtn.disabled = true;

            try {
                const storageRef = storage.ref('player_images/' + Date.now() + '_' + selectedFile.name);
                const uploadTask = await storageRef.put(selectedFile);
                const imageUrl = await uploadTask.ref.getDownloadURL();

                const playerData = {
                    firstName: firstName.value.trim(),
                    lastName: lastName.value.trim(),
                    age: parseInt(age.value),
                    phone: phone.value.trim(),
                    location: location.value.trim(),
                    imageUrl: imageUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                await playersCollection.add(playerData);
                form.reset();
                selectedFile = null;
                fileName.textContent = 'لم يتم اختيار صورة';
                showToast('تم التسجيل بنجاح ✅');
                loadPlayers();
            } catch (error) {
                console.error('خطأ في الحفظ:', error);
                showToast('حدث خطأ أثناء الحفظ: ' + error.message, true);
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        async function loadPlayers() {
            try {
                const snapshot = await playersCollection.orderBy('createdAt', 'desc').get();
                tableBody.innerHTML = '';
                if (snapshot.empty) {
                    noData.style.display = 'block';
                    return;
                }
                noData.style.display = 'none';

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const fullName = data.firstName + ' ' + data.lastName;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><img src="${data.imageUrl}" alt="صورة" class="player-img" /></td>
                        <td>${fullName}</td>
                        <td>${data.age}</td>
                        <td>${data.phone}</td>
                        <td>${data.location}</td>
                        <td>
                            <button class="action-btn" onclick="downloadPDF('${id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                            <button class="action-btn delete-btn" onclick="deletePlayer('${id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                showToast('فشل تحميل البيانات', true);
            }
        }

        window.deletePlayer = async function(id) {
            if (!confirm('هل أنت متأكد من حذف هذا اللاعب؟')) return;
            try {
                await playersCollection.doc(id).delete();
                showToast('تم الحذف بنجاح');
                loadPlayers();
            } catch (error) {
                console.error('خطأ في الحذف:', error);
                showToast('فشل الحذف', true);
            }
        };

        window.downloadPDF = async function(playerId) {
            try {
                const docRef = await playersCollection.doc(playerId).get();
                if (!docRef.exists) {
                    showToast('اللاعب غير موجود', true);
                    return;
                }
                const data = docRef.data();
                const fullName = data.firstName + ' ' + data.lastName;

                const container = document.createElement('div');
                container.style.cssText = 'padding: 20px; background: white; text-align: center; font-family: Tahoma; width: 400px; margin: auto;';
                container.innerHTML = `
                    <h2 style="color:#1e3c72;">أكاديمية كرة القدم</h2>
                    <hr style="border: 1px solid #2a5298;">
                    <img src="${data.imageUrl}" style="width:150px; height:150px; border-radius:50%; object-fit:cover; border:3px solid #2a5298; margin:15px 0;" />
                    <h3>${fullName}</h3>
                    <p><strong>العمر:</strong> ${data.age} سنة</p>
                    <p><strong>الهاتف:</strong> ${data.phone}</p>
                    <p><strong>المكان:</strong> ${data.location}</p>
                    <hr>
                    <p style="color:#888; font-size:12px;">تم التصدير من لوحة التحكم</p>
                `;
                document.body.appendChild(container);

                const canvas = await html2canvas(container, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`لاعب_${fullName}.pdf`);

                document.body.removeChild(container);
                showToast('تم تحميل PDF بنجاح');
            } catch (error) {
                console.error('خطأ في إنشاء PDF:', error);
                showToast('فشل إنشاء PDF', true);
            }
        };

        loadPlayers();
    </script>
</body>
</html>
